function fmt(s){if(s>=3600){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return m>0?h+"h "+m+"m":h+"h";}return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

function HomeScreen({onEnter}){
  var videoRef = useRef(null);
  var scrollRef = useRef(null);
  var brandRef = useRef(null);
  var hintRef = useRef(null);
  var rafId = useRef(null);
  var seekReady = useRef(false);

  useEffect(function(){
    var video = videoRef.current;
    if(!video) return;
    function onReady(){
      seekReady.current = true;
      video.pause();
      video.currentTime = 0;
    }
    video.addEventListener("loadeddata", onReady);
    video.addEventListener("canplaythrough", onReady);
    // Force load
    video.load();
    return function(){
      video.removeEventListener("loadeddata", onReady);
      video.removeEventListener("canplaythrough", onReady);
    };
  }, []);

  useEffect(function(){
    var el = scrollRef.current;
    if(!el) return;
    function onScroll(){
      if(rafId.current) return;
      rafId.current = requestAnimationFrame(function(){
        rafId.current = null;
        var video = videoRef.current;
        if(!video || !seekReady.current || !video.duration) return;
        var scrollTop = el.scrollTop;
        var viewH = el.clientHeight;
        var animEnd = viewH * 2.2;
        var p = Math.min(Math.max(scrollTop / animEnd, 0), 1);
        var targetTime = p * video.duration;
        if(Math.abs(video.currentTime - targetTime) > 0.01){
          video.currentTime = targetTime;
        }
        var fadeStart = 0.65;
        var brandOp = p >= fadeStart ? (p - fadeStart) / (1 - fadeStart) : 0;
        if(brandRef.current){
          brandRef.current.style.opacity = String(brandOp);
          brandRef.current.style.pointerEvents = brandOp > 0.5 ? "auto" : "none";
        }
        if(hintRef.current){
          hintRef.current.style.display = p < 0.05 ? "block" : "none";
        }
      });
    }
    el.addEventListener("scroll", onScroll, {passive: true});
    return function(){ el.removeEventListener("scroll", onScroll); };
  }, []);

  return(
    <div ref={scrollRef} style={{height:"100vh",overflowY:"auto",background:C.bg}}>
      <div style={{height:"300vh",position:"relative"}}>
        <div style={{position:"sticky",top:0,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg,overflow:"hidden"}}>
          <video
            ref={videoRef}
            muted
            playsInline
            preload="auto"
            poster="poster.jpg"
            style={{width:"100%",height:"100%",objectFit:"contain",pointerEvents:"none"}}
          >
            <source src="hero.mp4" type="video/mp4"/>
          </video>
          <div ref={brandRef} style={{position:"absolute",bottom:0,left:0,right:0,padding:"80px 0 44px",background:"linear-gradient(to bottom,transparent,"+C.bg+"cc 30%,"+C.bg+")",display:"flex",flexDirection:"column",alignItems:"center",opacity:0,pointerEvents:"none"}}>
            <div style={{fontSize:28,fontWeight:700,letterSpacing:"-0.03em",color:C.text}}>BrewLab</div>
            <div style={{fontSize:10,letterSpacing:"0.3em",textTransform:"uppercase",color:C.stone,marginTop:6}}>Craft better coffee</div>
          </div>
          <div ref={hintRef} style={{position:"absolute",bottom:28,left:"50%",transform:"translateX(-50%)",opacity:0.35}}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke={C.stone} strokeWidth="1.5" strokeLinecap="round"><path d="M4 6l4 4 4-4"/></svg>
          </div>
        </div>
      </div>
      <div style={{background:C.bg,padding:"20px 36px 56px",textAlign:"center"}}>
        <div style={{fontSize:14,color:C.muted,lineHeight:1.8,maxWidth:280,margin:"0 auto"}}>Guided recipes, precision ratios, and everything you need to brew beautifully at home.</div>
        <div style={{display:"flex",justifyContent:"center",gap:28,marginTop:40}}>
          {[{c:MC.v60.main,l:"V60",Ic:V60I},{c:MC.aeropress.main,l:"AeroPress",Ic:ApI},{c:MC.coldbrew.main,l:"Cold Brew",Ic:CbI}].map(function(x){
            return <div key={x.l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
              <div style={{width:50,height:50,borderRadius:14,background:C.greenPale,display:"flex",alignItems:"center",justifyContent:"center"}}><x.Ic size={26} color={x.c}/></div>
              <span style={{fontSize:10,color:C.stone,fontWeight:500}}>{x.l}</span>
            </div>;
          })}
        </div>
        <button onClick={onEnter} style={{marginTop:44,padding:"15px 52px",borderRadius:14,border:"none",background:C.green,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Outfit',sans-serif",letterSpacing:"0.08em"}}>Start Brewing</button>
      </div>
    </div>
  );
}

function RecipesScreen({onBrew}){var[mf,setMf]=useState(null);var fl=mf?RECIPES.filter(function(r){return r.method===mf;}):RECIPES;return(<div style={{display:"flex",flexDirection:"column",gap:36}}><div><Lbl>Brew Method</Lbl><div style={{display:"flex",gap:10}}>{METHODS.map(function(m){var mc=MC[m.id],sel=mf===m.id,Ic=MI[m.id];return <button key={m.id} onClick={function(){setMf(sel?null:m.id);}} style={{flex:1,padding:"26px 12px 20px",borderRadius:16,cursor:"pointer",border:sel?"none":"1px solid "+C.line,background:sel?mc.main:C.card,display:"flex",flexDirection:"column",alignItems:"center",gap:12,boxShadow:sel?"0 6px 24px "+mc.main+"30":"none"}}><div style={{width:44,height:44,borderRadius:12,background:sel?"rgba(255,255,255,.2)":C.greenPale,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic size={28} color={sel?"#fff":mc.main}/></div><div style={{textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:sel?"#fff":C.text}}>{m.short}</div><div style={{fontSize:10,color:sel?"rgba(255,255,255,.6)":C.faint,marginTop:2}}>{m.ratio} {"\u00B7"} {m.time}</div></div></button>;})}</div></div><div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><Lbl>{mf?METHODS.find(function(m){return m.id===mf;}).short+" Recipes":"All Recipes"}</Lbl>{mf&&<button onClick={function(){setMf(null);}} style={{background:"none",border:"none",fontSize:11,color:C.faint,cursor:"pointer"}}>Show all</button>}</div><div style={{display:"flex",flexDirection:"column"}}>{fl.map(function(r,i){var mc=MC[r.method],Ic=MI[r.method];return <button key={r.id} onClick={function(){onBrew(r);}} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 4px",background:"none",border:"none",borderBottom:i<fl.length-1?"1px solid "+C.line:"none",cursor:"pointer",textAlign:"left",width:"100%",fontFamily:"'Outfit',sans-serif"}}><div style={{width:44,height:44,borderRadius:12,background:mc.light,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic size={24} color={mc.main}/></div><div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:500,color:C.text}}>{r.name}</div><div style={{fontSize:11,color:C.faint,marginTop:2}}>{r.author}</div></div><div style={{textAlign:"right",flexShrink:0,marginRight:4}}><div style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:C.muted}}>{r.coffee}g : {r.water}g</div><div style={{fontSize:10,color:C.faint,marginTop:2}}>{r.roast}</div></div><ChI/></button>;})}</div></div></div>);}

function CalcScreen(){var[m,sM]=useState("v60");var[ro,sR]=useState("medium");var[pr,sP]=useState("balanced");var[cu,sC]=useState(1);var bR={v60:15,aeropress:12,coldbrew:8},cS={v60:250,aeropress:220,coldbrew:300},bT={v60:94,aeropress:86,coldbrew:4};var rd=ROASTS.find(function(r){return r.id===ro;}),pd=PREFS.find(function(p){return p.id===pr;});var ratio=bR[m]+(rd?rd.rA:0)+(pd?pd.rA:0),tw=cS[m]*cu,cof=Math.round((tw/ratio)*10)/10;var temp=m==="coldbrew"?"Room temp":(bT[m]+(rd?rd.tA:0))+"\u00B0C";var md=METHODS.find(function(x){return x.id===m;}),mc=MC[m],pills=["1:"+ratio,temp,md?md.grind:""];return(<div style={{display:"flex",flexDirection:"column",gap:28}}><div><Lbl>Method</Lbl><Tog options={METHODS} value={m} onChange={sM}/></div><div><Lbl>Roast level</Lbl><Tog options={ROASTS} value={ro} onChange={sR}/></div><div><Lbl>Taste preference</Lbl><Tog options={PREFS} value={pr} onChange={sP}/></div><div><Lbl>Servings</Lbl><div style={{display:"flex",alignItems:"center",gap:24,justifyContent:"center"}}><button onClick={function(){sC(Math.max(1,cu-1));}} style={{width:44,height:44,borderRadius:"50%",border:"1.5px solid "+C.line,background:C.card,fontSize:18,cursor:"pointer",color:C.stone,display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u2212"}</button><span style={{fontSize:42,fontWeight:300,fontFamily:"'DM Mono',monospace",color:C.text,minWidth:36,textAlign:"center"}}>{cu}</span><button onClick={function(){sC(Math.min(8,cu+1));}} style={{width:44,height:44,borderRadius:"50%",border:"1.5px solid "+C.line,background:C.card,fontSize:18,cursor:"pointer",color:C.stone,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button></div></div><div style={{background:mc.light,borderRadius:20,padding:"32px 24px",textAlign:"center"}}><div style={{display:"flex",justifyContent:"center",gap:32}}><div><div style={{fontSize:42,fontWeight:300,fontFamily:"'DM Mono',monospace",color:C.text,lineHeight:1}}>{cof}</div><div style={{fontSize:9,color:C.muted,marginTop:8
